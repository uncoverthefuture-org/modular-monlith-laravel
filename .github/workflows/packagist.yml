name: Update Packagist

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-packagist:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Packagist credentials from Infisical
        uses: infisical/infisical-action@v0.2.0
        with:
          # Organization-level secrets
          client_id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client_secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          # Project and environment where PACKAGIST credentials are stored
          project_id: ${{ vars.INFISICAL_PROJECT_ID }}
          environment: ${{ vars.INFISICAL_ENVIRONMENT }}
          # Secrets to fetch
          secrets: "PACKAGIST_API_TOKEN,PACKAGIST_USERNAME"

      - name: Trigger Packagist Update
        run: |
          curl -X POST "https://packagist.org/api/update-package" \
            -H "Accept: application/json" \
            -u "${{ secrets.PACKAGIST_USERNAME }}:${{ secrets.PACKAGIST_API_TOKEN }}" \
            -d "repository=https://github.com/uncoverthefuture-org/modular-monlith-laravel"
        env:
          CURL_OPTS: "-f --show-error"
