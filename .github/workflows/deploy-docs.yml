name: Deploy Documentation

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      version:
        description: 'The version tag to deploy (e.g. v1.12.0)'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate-version:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.validate.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Validate version tag
        id: validate
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "${VERSION}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Invalid version format: ${VERSION}. Expected format: v*.*.*"
            exit 1
          fi
          if ! git tag -l "${VERSION}" | grep -q "${VERSION}"; then
            echo "❌ Git tag '${VERSION}' does not exist. Create the tag first before deploying."
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  resolve-version:
    runs-on: ubuntu-latest
    if: "github.event_name == 'pull_request' && github.event.pull_request.merged == true && (startsWith(github.event.pull_request.head.ref, 'release-please--') || startsWith(github.event.pull_request.head.ref, 'chore(main): release'))"
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract Release Version
        id: extract
        run: |
          echo "version=latest" >> "$GITHUB_OUTPUT"

  get-version:
    needs: [validate-version, resolve-version]
    if: always() && (needs.validate-version.result == 'success' || needs.resolve-version.result == 'success')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Establish Version Output
        id: meta
        run: |
          SELECTED_VERSION="${{ needs.validate-version.outputs.version || needs.resolve-version.outputs.version }}"
          echo "version=${SELECTED_VERSION}" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    if: always() && needs.get-version.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Laravel Package Project
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.get-version.outputs.version != 'latest' && needs.get-version.outputs.version || '' }}
          path: modular-monlith-data

      - name: Checkout Uncover Docs Shell
        uses: actions/checkout@v4
        with:
          repository: uncoverthefuture-org/uncover-docs
          path: docs-ui
          token: ${{ secrets.PAT_TOKEN }}

      - name: Inject Target Data
        run: |
          cp -r modular-monlith-data/docs/src/data/* docs-ui/src/data/ || true
          cp -r modular-monlith-data/docs/src/assets/* docs-ui/public/ || true

      - name: Enable Corepack for Yarn
        run: corepack enable
        working-directory: docs-ui

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "yarn"
          cache-dependency-path: docs-ui/yarn.lock

      - name: Install dependencies
        run: yarn install
        working-directory: docs-ui

      - name: Build documentation
        run: yarn build && cp dist/index.html dist/404.html
        working-directory: docs-ui

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-ui/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
