name: Release Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: google-github-actions/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: php
          package-name: uncover/modular-monolith-laravel
          include-v-in-tag: true
          include-body-in-tag: true
          # Separate major version branches for different Laravel versions
          branches-config: |
            {
              "branch-groups": [
                {
                  "strategy": "node",
                  "release-type": "node",
                  "include-v-in-tag": false,
                  "branch": "laravel-12"
                },
                {
                  "strategy": "node",
                  "release-type": "node", 
                  "include-v-in-tag": false,
                  "branch": "laravel-11"
                },
                {
                  "strategy": "node",
                  "release-type": "node",
                  "include-v-in-tag": false,
                  "branch": "laravel-10"
                }
              ]
            }